<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NSCLC Phase 2 — Mutation-Targeted Trial Finder</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Mono',monospace;background:#050d1a;color:#e2e8f0;min-height:100vh}
a{color:#38bdf8;text-decoration:none}
a:hover{text-decoration:underline}
input,select,button{font-family:inherit}
@keyframes spin{to{transform:rotate(360deg)}}

.hdr{background:linear-gradient(135deg,#060f1e,#0b1a30);border-bottom:1px solid #162032;padding:20px 24px 14px}
.hdr-tag{font-size:10px;letter-spacing:.18em;color:#3b82f6;text-transform:uppercase;font-weight:600;margin-bottom:4px}
.hdr-h1{font-size:clamp(14px,2.2vw,20px);font-weight:600;color:#f0f9ff;margin-bottom:3px}
.hdr-sub{font-size:11px;color:#475569}

.body{padding:14px 24px 60px}

/* stat cards */
.srow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.sc{background:#0a1628;border:1px solid #162032;border-radius:8px;padding:8px 13px;min-width:72px}
.sc-l{font-size:9px;color:#475569;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
.sc-v{font-size:19px;font-weight:600}

/* progress */
.prog{display:flex;align-items:center;gap:10px;background:#0a1628;border:1px solid #162032;border-radius:8px;padding:9px 14px;margin-bottom:12px}
.pt{flex:1;height:3px;background:#162032;border-radius:2px;max-width:200px}
.pf{height:100%;background:#3b82f6;border-radius:2px;transition:width .3s}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:11px}
.chip{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #162032;background:transparent;color:#475569;white-space:nowrap;transition:all .1s}
.chip:hover{border-color:#334155;color:#94a3b8}

/* filters */
.frow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center}
.frow input{flex:1 1 180px;min-width:0;padding:7px 10px;border-radius:6px;border:1px solid #162032;background:#0a1628;color:#e2e8f0;font-size:12px;outline:none}
.frow select{padding:7px 10px;border-radius:6px;border:1px solid #162032;background:#0a1628;color:#e2e8f0;font-size:12px;cursor:pointer;outline:none}
.vbtn{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #162032;background:transparent;color:#475569}
.vbtn.on{border-color:#3b82f6;background:#0d2340;color:#7dd3fc}

/* table */
.tw{overflow-x:auto;border-radius:10px;border:1px solid #0f1e30}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{padding:8px 11px;text-align:left;background:#0b1628;color:#64748b;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid #1e293b;cursor:pointer;white-space:nowrap;user-select:none}
thead th:hover{color:#94a3b8}
.tha::after{content:" ↑"}.thd::after{content:" ↓"}.thn::after{content:" ⇅";opacity:.3}
tbody tr.dr{border-bottom:1px solid #0a1425;cursor:pointer;transition:background .1s}
tbody tr.dr:nth-child(4n+1),tbody tr.dr:nth-child(4n+2){background:#050d1a}
tbody tr.dr:nth-child(4n+3),tbody tr.dr:nth-child(4n+4){background:#07101e}
tbody tr.dr:hover,tbody tr.dr.open{background:#0c1e35!important}
tbody tr.er td{padding:0}
td{padding:8px 11px;vertical-align:middle}

/* badges */
.bdg{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap}

/* expanded */
.ei{padding:14px 16px;background:#060e1c;border-top:1px solid #162032}
.egrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}

.esec{background:#0a1628;border:1px solid #162032;border-radius:8px;padding:10px 12px}
.esec-t{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#475569;font-weight:600;margin-bottom:8px}

.rnct{color:#38bdf8;font-weight:600;white-space:nowrap;flex-shrink:0}

/* cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}

.card:hover{border-color:#3b82f6}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:6px}
.cnct{font-size:10px;color:#38bdf8;font-weight:600;margin-bottom:2px}
.cdrug{font-size:13px;color:#f0f9ff;font-weight:600}
.cttl{font-size:11px;color:#64748b;line-height:1.5;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.ctags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px}

.footer{margin-top:14px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;font-size:10px;color:#1e3a5f}

<body>

<div class="hdr">
  <div class="hdr-tag">ClinicalTrials.gov · Phase II · Live API · All Statuses</div>
  <div class="hdr-h1">NSCLC + Basket — Mutation-Targeted Therapy Finder</div>
  <div class="hdr-sub">Advanced / Metastatic · All genetic mutations · Click any row to see Phase 1 &amp; 3 companions</div>
</div>

<div class="body" id="app">
  <div style="text-align:center;padding:70px 0;color:#475569">
    <div style="font-size:10px;letter-spacing:.2em;color:#3b82f6;margin-bottom:12px;text-transform:uppercase">Connecting to ClinicalTrials.gov…</div>
    <div style="font-size:30px;animation:spin 1s linear infinite;display:inline-block">⟳</div>
    <div style="font-size:11px;margin-top:14px" id="init-msg">Fetching Phase 2 lung cancer trials…</div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════
   SAME APPROACH AS THE WORKING PHASE 3 APP:
   • ONE broad query to CTG
   • Sequential page-by-page fetching
   • Client-side drug-name matching for mutation tagging
   • No overallStatus filter → all statuses returned
══════════════════════════════════════════════════════ */

const API = "https://clinicaltrials.gov/api/v2/studies";
const MAX_PAGES = 8;   // 8 × 100 = up to 800 studies scanned

/* ── Drug → Target map (same as working Phase 3 app) ── */
const DRUG_TARGET = {

  sunvozertinib:"EGFR",mobocertinib:"EGFR",exkivity:"EGFR",

  savolitinib:"MET",glumetinib:"MET",bozitinib:"MET",vebreltinib:"MET",
  elzovantinib:"MET","apl-101":"MET",glesatinib:"MET",merestinib:"MET",
  tivantinib:"MET",crizotinib:"MET",xalkori:"MET",

  selpercatinib:"RET",retevmo:"RET",pralsetinib:"RET",gavreto:"RET",
  "bos172738":"RET","tpx-0046":"RET","ds-5010":"RET",
  // KRAS G12C
  sotorasib:"KRAS G12C",lumakras:"KRAS G12C",adagrasib:"KRAS G12C",
  krazati:"KRAS G12C",garsorasib:"KRAS G12C",glecirasib:"KRAS G12C",
  jdq443:"KRAS G12C",divarasib:"KRAS G12C","ly3537982":"KRAS G12C",
  "d-1553":"KRAS G12C","gdc-6036":"KRAS G12C","amg-510":"KRAS G12C","mrtx849":"KRAS G12C",
  // KRAS other
  "mrtx1133":"KRAS G12D","rmc-9805":"KRAS G12D","rmc-6236":"KRAS","hrs-4642":"KRAS G12D",
  // HER2
  zongertinib:"HER2",hernexeos:"HER2",pyrotinib:"HER2",poziotinib:"HER2",
  tucatinib:"HER2",tukysa:"HER2",neratinib:"HER2",nerlynx:"HER2",
  sevabertinib:"HER2","bay 2927088":"HER2",lapatinib:"HER2",tykerb:"HER2",
  "trastuzumab deruxtecan":"HER2","t-dxd":"HER2","ds-8201":"HER2",enhertu:"HER2",
  mobocertinib:"HER2",  // exon20ins also HER2-adjacent

  "patritumab deruxtecan":"HER3","u3-1402":"HER3","ifinatamab deruxtecan":"HER3",

  encorafenib:"BRAF",braftovi:"BRAF","bgb-283":"BRAF",
  // MEK
  trametinib:"MEK",mekinist:"MEK",cobimetinib:"MEK",cotellic:"MEK",
  binimetinib:"MEK",mectovi:"MEK",selumetinib:"MEK",koselugo:"MEK",
  // FGFR
  erdafitinib:"FGFR",balversa:"FGFR",infigratinib:"FGFR",truseltiq:"FGFR",
  pemigatinib:"FGFR",pemazyre:"FGFR",futibatinib:"FGFR",lytgobi:"FGFR",
  "azd4547":"FGFR","bgj398":"FGFR",derazantinib:"FGFR",

  zenocutuzumab:"NRG1",seribantumab:"NRG1","mcla-128":"NRG1",

  alpelisib:"PIK3CA",piqray:"PIK3CA",copanlisib:"PIK3CA",aliqopa:"PIK3CA",
  idelalisib:"PIK3CA",zydelig:"PIK3CA",buparlisib:"PIK3CA",taselisib:"PIK3CA",
  "gdc-0077":"PIK3CA",inavolisib:"PIK3CA",
  // PARP
  olaparib:"PARP",lynparza:"PARP",rucaparib:"PARP",rubraca:"PARP",
  niraparib:"PARP",zejula:"PARP",talazoparib:"PARP",talzenna:"PARP",
  veliparib:"PARP","abt-888":"PARP",
  // mTOR
  everolimus:"mTOR",afinitor:"mTOR",temsirolimus:"mTOR",torisel:"mTOR",

  palbociclib:"CDK4/6",ibrance:"CDK4/6",ribociclib:"CDK4/6",kisqali:"CDK4/6",
  abemaciclib:"CDK4/6",verzenio:"CDK4/6",
  // HIF2α
  belzutifan:"HIF2α",welireg:"HIF2α","mk-6482":"HIF2α","pt2977":"HIF2α",
  // SMARCA4
  tazemetostat:"SMARCA4",tazverik:"SMARCA4",
  // TP53
  "apr-246":"TP53",eprenetapopt:"TP53","pc14586":"TP53",
  // EGFR+MET bispecific
  amivantamab:"EGFR/MET",rybrevant:"EGFR/MET","jnj-61186372":"EGFR/MET",
  // STK11/KEAP1 targeted
  omaveloxolone:"STK11/KEAP1",

/* ── Colors ── */
const MUT_C = {
  EGFR:"#f97316",ALK:"#a78bfa",ROS1:"#34d399",MET:"#60a5fa",RET:"#fb7185",
  "KRAS G12C":"#eab308","KRAS G12D":"#ca8a04",KRAS:"#d97706",
  HER2:"#e879f9",HER3:"#c084fc",NTRK:"#2dd4bf",BRAF:"#f43f5e",MEK:"#f59e0b",
  FGFR:"#06b6d4",NRG1:"#7c3aed",PIK3CA:"#84cc16",PARP:"#d946ef",
  mTOR:"#10b981","CDK4/6":"#0ea5e9","HIF2α":"#6366f1",SMARCA4:"#8b5cf6",
  TP53:"#ef4444","EGFR/MET":"#fb923c","STK11/KEAP1":"#78716c",
};

const ST_S = {
  RECRUITING:              {l:"Recruiting",    bg:"#052e16",tc:"#4ade80"},
  ACTIVE_NOT_RECRUITING:   {l:"Active",        bg:"#1c1400",tc:"#fbbf24"},
  COMPLETED:               {l:"Completed",     bg:"#0c1a3d",tc:"#818cf8"},
  NOT_YET_RECRUITING:      {l:"Not Yet",       bg:"#082f49",tc:"#7dd3fc"},
  TERMINATED:              {l:"Terminated",    bg:"#2d0b0b",tc:"#f87171"},
  WITHDRAWN:               {l:"Withdrawn",     bg:"#2d0b0b",tc:"#f87171"},
  SUSPENDED:               {l:"Suspended",     bg:"#1c1400",tc:"#fbbf24"},
  ENROLLING_BY_INVITATION: {l:"By Invitation", bg:"#0c2a1a",tc:"#6ee7b7"},
  UNKNOWN:                 {l:"Unknown",       bg:"#1e293b",tc:"#64748b"},
};

/* ── Basket detection keywords ── */
const BASKET_KW = [
  "basket","tumor agnostic","tissue agnostic","agnostic",
  "multiple tumor","pan-tumor","biomarker-selected","histology-independent",
  "histology agnostic","molecularly selected","biomarker driven",
];

/* ── Detect drug + target from one raw study ── */
function detectTarget(raw) {
  const p   = raw.protocolSection;
  const ivs = p?.armsInterventionsModule?.interventions || [];
  const title = (p?.identificationModule?.briefTitle    || "").toLowerCase();
  const offic = (p?.identificationModule?.officialTitle || "").toLowerCase();

  // 1. Scan interventions
  for (const iv of ivs) {
    if (!["DRUG","BIOLOGICAL","COMBINATION_PRODUCT"].includes(iv.type)) continue;
    const name = (iv.name || "").toLowerCase();
    for (const [kw, tgt] of Object.entries(DRUG_TARGET)) {
      if (name.includes(kw)) return { target: tgt, drug: iv.name };
    }
  }
  // 2. Scan title / official title
  for (const [kw, tgt] of Object.entries(DRUG_TARGET)) {
    if (title.includes(kw) || offic.includes(kw)) {
      return { target: tgt, drug: kw.charAt(0).toUpperCase()+kw.slice(1) };
    }
  }
  return null;
}

/* ── Parse raw study into our model ── */
function parseStudy(raw) {
  const t = detectTarget(raw);
  if (!t) return null;   // skip if no known targeted agent found

  const p   = raw.protocolSection;
  const idm = p?.identificationModule;
  const stm = p?.statusModule;
  const spm = p?.sponsorCollaboratorsModule;
  const dsm = p?.designModule;
  const cdm = p?.conditionsModule;
  const dsc = p?.descriptionModule;
  const arm = p?.armsInterventionsModule;

  // Arm type
  let armType = "UNKNOWN";
  for (const a of (arm?.armGroups || [])) {
    if (a.type !== "EXPERIMENTAL") continue;
    armType = (a.interventionNames||[]).length <= 1 ? "MONO" : "COMBO";
    break;
  }

  // Trial type — basket or NSCLC-specific
  const allTxt = [
    idm?.briefTitle||"",
    (cdm?.conditions||[]).join(" "),
    (cdm?.keywords||[]).join(" "),
    (dsc?.briefSummary||"").slice(0,300),
  ].join(" ").toLowerCase();
  const trialType = BASKET_KW.some(k=>allTxt.includes(k)) ? "BASKET" : "NSCLC";

  const sdS = stm?.startDateStruct;

  return {
    nctId:      idm?.nctId,
    title:      idm?.briefTitle || "",
    target:     t.target,
    drug:       t.drug,
    status:     stm?.overallStatus || "UNKNOWN",
    startDate:  sdS?.date  || null,
    startType:  sdS?.type  || null,   // "ACTUAL" | "ESTIMATED"
    endDate:    stm?.primaryCompletionDateStruct?.date || null,
    sponsor:    spm?.leadSponsor?.name || "—",
    enrollment: dsm?.enrollmentInfo?.count || null,
    armType,
    trialType,
    summary:    (dsc?.briefSummary||"").slice(0,380),
    conditions: (cdm?.conditions||[]).join("; "),
  };
}

/* ══ State ══════════════════════════════════════════ */
let studies = [];
let loading  = true;
let scanned  = 0;      // raw studies scanned
let pagesDone = 0;

/* filters — ALL default to "All" so nothing is hidden */
let sk="startDate", sd_="desc";
let fT="All", fS="All", fTY="All", fQ="";
let curView="table", expId=null;
const relCache = {};  // nctId → {p1,p3,loading}

/* ══ Sequential fetch ═══════════════════════════════
   Same pattern as the working Phase 3 app:
   one broad query, page by page.
════════════════════════════════════════════════════ */
async function loadStudies() {
  loading = true;
  let nextToken = null;

  for (let page = 0; page < MAX_PAGES; page++) {
    try {
      const params = new URLSearchParams({
        "query.cond":  "lung cancer",
        "filter.phase":"PHASE2",
        "aggFilters":  "studyType:int",
        // NO overallStatus filter → returns ALL statuses
        "pageSize":    "100",
        "format":      "json",
      });
      if (nextToken) params.append("pageToken", nextToken);

      const res = await fetch(`${API}?${params}`);
      if (!res.ok) throw new Error("HTTP "+res.status);
      const data = await res.json();

      const raw = data.studies || [];
      scanned += raw.length;
      nextToken = data.nextPageToken || null;

      for (const r of raw) {
        const s = parseStudy(r);
        if (s) studies.push(s);
      }

      pagesDone = page + 1;
      render();   // update display after each page

      if (!nextToken) break;
    } catch(e) {
      console.error("Fetch error page", page, e);
      break;
    }
  }

  loading = false;
  render();
}

/* ══ Related Phase 1 / 3 ════════════════════════════ */
async function loadRelated(nctId, drug) {
  if (relCache[nctId]) return;
  relCache[nctId] = { p1:[], p3:[], loading:true };
  repaintExpanded();
  const [p1, p3] = await Promise.all([
    fetchPhase(drug, "PHASE1"),
    fetchPhase(drug, "PHASE3"),
  ]);
  relCache[nctId] = { p1, p3, loading:false };
  repaintExpanded();
}

async function fetchPhase(drug, phase) {
  try {
    const params = new URLSearchParams({
      "query.term":  drug,
      "filter.phase":phase,
      "query.cond":  "lung cancer",
      "pageSize":    "8",
      "format":      "json",
    });
    const r = await fetch(`${API}?${params}`);
    if (!r.ok) return [];
    const d = await r.json();
    return (d.studies||[]).map(s=>({
      nctId:     s.protocolSection?.identificationModule?.nctId,
      title:     s.protocolSection?.identificationModule?.briefTitle||"",
      status:    s.protocolSection?.statusModule?.overallStatus||"UNKNOWN",
      startDate: s.protocolSection?.statusModule?.startDateStruct?.date||null,
    }));
  } catch { return []; }
}

/* ══ Filter / Sort ══════════════════════════════════ */
function getFiltered() {
  let s = studies;
  if (fT  !== "All") s = s.filter(x => x.target   === fT);
  if (fS  !== "All") s = s.filter(x => x.status   === fS);
  if (fTY !== "All") s = s.filter(x => x.trialType === fTY);
  if (fQ) {
    const q = fQ.toLowerCase();
    s = s.filter(x =>
      [x.title,x.drug,x.nctId,x.sponsor,x.target,x.conditions]
        .some(v => v && v.toLowerCase().includes(q))
    );
  }
  return [...s].sort((a,b) => {
    const av = a[sk]||"", bv = b[sk]||"";
    return sd_==="asc"
      ? String(av).localeCompare(String(bv))
      : String(bv).localeCompare(String(av));
  });
}

function cntBy(key) {
  const m = {};
  studies.forEach(s => { m[s[key]] = (m[s[key]]||0)+1; });
  return m;
}

/* ══ Badge helpers ══════════════════════════════════ */
function mBdg(t) {
  const c = MUT_C[t] || "#94a3b8";
  return `<span class="bdg" style="background:${c}18;color:${c};border:1px solid ${c}40">${t}</span>`;
}
function sBdg(st) {
  const s = ST_S[st] || ST_S.UNKNOWN;
  return `<span class="bdg" style="background:${s.bg};color:${s.tc}">${s.l}</span>`;
}
function aBdg(a) {
  if (a==="MONO")  return `<span style="font-size:10px;font-weight:600;color:#4ade80">● MONO</span>`;
  if (a==="COMBO") return `<span style="font-size:10px;font-weight:600;color:#fbbf24">◐ COMBO</span>`;
  return `<span style="font-size:10px;color:#334155">—</span>`;
}
function tBdg(t) {
  return t==="BASKET"
    ? `<span style="font-size:10px;font-weight:600;color:#a78bfa">⬡ BASKET</span>`
    : `<span style="font-size:10px;font-weight:600;color:#38bdf8">◆ NSCLC</span>`;
}
function thC(k) { return sk===k ? (sd_==="asc"?"tha":"thd") : "thn"; }
function sdDisp(s) {
  if (!s.startDate) return "—";
  const tag = s.startType==="ACTUAL" ? " (A)" : s.startType==="ESTIMATED" ? " (E)" : "";
  return s.startDate + tag;
}
function rsBdg(st) {
  const s = ST_S[st]||ST_S.UNKNOWN;
  return `<span class="rst" style="background:${s.bg};color:${s.tc}">${s.l}</span>`;
}

/* ══ Repaint expanded row ════════════════════════════ */
function repaintExpanded() {
  if (!expId) return;
  const el = document.getElementById("exp-"+expId);
  if (!el) return;
  const s = studies.find(x => x.nctId===expId);
  if (!s) return;
  const rel = relCache[expId];

  let relHtml = "";
  if (!rel) {
    relHtml = `<p class="rnone">Loading…</p>`;
  } else if (rel.loading) {
    relHtml = `<p class="rnone" style="display:flex;align-items:center;gap:6px">
      <span style="animation:spin 1s linear infinite;display:inline-block">⟳</span>
      Querying Phase 1 &amp; 3 from ClinicalTrials.gov…</p>`;
  } else {
    const mkList = (arr, ph) => {
      if (!arr.length) return `<li class="ri"><span class="rnone">No ${ph} lung cancer studies found for "${s.drug}"</span></li>`;
      return arr.map(r=>`<li class="ri">
        <a href="https://clinicaltrials.gov/study/${r.nctId}" target="_blank" class="rnct">${r.nctId}</a>
        ${rsBdg(r.status)}
        <span class="rtitle">${r.title}</span>
        ${r.startDate?`<span style="font-size:10px;color:#334155;white-space:nowrap">${r.startDate}</span>`:""}
      </li>`).join("");
    };
    relHtml = `
      <div style="margin-bottom:10px">
        <div class="esec-t" style="color:#a78bfa">Phase 1 — ${rel.p1.length} found</div>
        <ul class="rlist">${mkList(rel.p1,"Phase 1")}</ul>
      </div>
      <div>
        <div class="esec-t" style="color:#4ade80">Phase 3 — ${rel.p3.length} found</div>
        <ul class="rlist">${mkList(rel.p3,"Phase 3")}</ul>
      </div>`;
  }

  el.innerHTML = `<div class="ei">
    <div style="font-size:12px;color:#94a3b8;line-height:1.65;margin-bottom:10px">${s.title}</div>
    <div class="egrid">
      <div class="esec">
        <div class="esec-t">Study details — ClinicalTrials.gov</div>
        <div class="kv"><span class="k">NCT ID</span>
          <span class="v"><a href="https://clinicaltrials.gov/study/${s.nctId}" target="_blank">${s.nctId} ↗</a></span></div>
        <div class="kv"><span class="k">Study start date</span>
          <span class="v">${sdDisp(s)}</span></div>
        <div class="kv"><span class="k">Est. primary completion</span>
          <span class="v">${s.endDate||"—"}</span></div>
        <div class="kv"><span class="k">Enrollment target</span>
          <span class="v">${s.enrollment?Number(s.enrollment).toLocaleString():"—"}</span></div>
        <div class="kv"><span class="k">Lead sponsor</span>
          <span class="v">${s.sponsor}</span></div>
        <div class="kv"><span class="k">Status</span>
          <span class="v">${sBdg(s.status)}</span></div>
        <div class="kv"><span class="k">Primary drug</span>
          <span class="v">${s.drug}</span></div>
        <div class="kv"><span class="k">Target</span>
          <span class="v">${mBdg(s.target)}</span></div>
        <div class="kv"><span class="k">Trial type</span>
          <span class="v">${tBdg(s.trialType)}</span></div>
        <div class="kv"><span class="k">Arm type</span>
          <span class="v">${aBdg(s.armType)}</span></div>
        <div class="kv"><span class="k">Conditions (from CTG)</span>
          <span class="v" style="font-size:10px">${(s.conditions||"—").slice(0,150)}</span></div>
      </div>
      <div class="esec">
        <div class="esec-t">Companion studies — same drug, lung cancer</div>
        ${relHtml}
      </div>
    </div>
    ${s.summary?`<div style="font-size:11px;color:#475569;line-height:1.65;border-left:2px solid #162032;padding-left:10px;margin-top:2px">${s.summary}…</div>`:""}
  </div>`;
}

/* ══ Main render ════════════════════════════════════ */
function render() {
  const f   = getFiltered();
  const mc  = cntBy("target");
  const sc_ = cntBy("status");
  const pct = Math.min(95, Math.round((pagesDone/MAX_PAGES)*100));

  const statCards = [
    {l:"Total matched",  v:studies.length,                                            c:"#e2e8f0"},
    {l:"Recruiting",     v:studies.filter(s=>s.status==="RECRUITING").length,         c:"#4ade80"},
    {l:"Active",         v:studies.filter(s=>s.status==="ACTIVE_NOT_RECRUITING").length, c:"#fbbf24"},
    {l:"Completed",      v:studies.filter(s=>s.status==="COMPLETED").length,          c:"#818cf8"},
    {l:"Terminated",     v:studies.filter(s=>s.status==="TERMINATED").length,         c:"#f87171"},
    {l:"Basket trials",  v:studies.filter(s=>s.trialType==="BASKET").length,          c:"#a78bfa"},
    {l:"Targets",        v:Object.keys(mc).length,                                    c:"#f97316"},
  ];

  const stOpts = [["All","All statuses"],
    ...Object.entries(sc_).sort((a,b)=>b[1]-a[1])
      .map(([s,n])=>[s,`${ST_S[s]?.l||s} (${n})`])];

  const muts = Object.entries(mc).sort((a,b)=>b[1]-a[1]);

  document.getElementById("app").innerHTML = `

    <div class="srow">
      ${statCards.map(s=>`<div class="sc">
        <div class="sc-l">${s.l}</div>
        <div class="sc-v" style="color:${s.c}">${s.v}</div>
      </div>`).join("")}
    </div>

    ${loading ? `<div class="prog">
      <span style="font-size:14px;animation:spin 1s linear infinite;display:inline-block">⟳</span>
      <div style="flex:1">
        <div style="font-size:11px;color:#94a3b8;margin-bottom:4px">
          Page ${pagesDone}/${MAX_PAGES} · ${scanned} studies scanned · <b style="color:#7dd3fc">${studies.length}</b> mutation-targeted trials found
        </div>
        <div class="pt"><div class="pf" style="width:${pct}%"></div></div>
      </div>
    </div>` : `<div style="font-size:11px;color:#334155;margin-bottom:10px">
      ✓ Complete — ${scanned} Phase 2 lung cancer trials scanned ·
      <b style="color:#7dd3fc">${studies.length}</b> mutation-targeted matched · All statuses shown
    </div>`}

    <div class="chips">
      <button class="chip" onclick="fT='All';expId=null;render()"
        style="border-color:${fT==="All"?"#3b82f6":"#162032"};background:${fT==="All"?"#0d2340":"transparent"};color:${fT==="All"?"#7dd3fc":"#475569"}">
        All · ${studies.length}
      </button>
      ${muts.map(([m,n])=>{
        const c=MUT_C[m]||"#94a3b8", a=fT===m;
        return `<button class="chip" onclick="fT='${m.replace(/'/g,"\\'")}';expId=null;render()"
          style="border-color:${a?c:"#162032"};background:${a?c+"20":"transparent"};color:${a?c:"#475569"}">
          ${m} · ${n}
        </button>`;
      }).join("")}
    </div>

    <div class="frow">
      <input type="text" placeholder="Search NCT ID, drug, target, sponsor, condition…"
        value="${fQ.replace(/"/g,"&quot;")}" oninput="fQ=this.value;render()"/>
      <select onchange="fS=this.value;render()">
        ${stOpts.map(([v,l])=>`<option value="${v}"${fS===v?" selected":""}>${l}</option>`).join("")}
      </select>
      <select onchange="fTY=this.value;render()">
        <option value="All"${fTY==="All"?" selected":""}>NSCLC + Basket</option>
        <option value="NSCLC"${fTY==="NSCLC"?" selected":""}>NSCLC only</option>
        <option value="BASKET"${fTY==="BASKET"?" selected":""}>Basket only</option>
      </select>
      <div style="display:flex;gap:4px;margin-left:auto">
        <button class="vbtn${curView==="table"?" on":""}" onclick="curView='table';render()">⊞ Table</button>
        <button class="vbtn${curView==="cards"?" on":""}" onclick="curView='cards';render()">⊟ Cards</button>
      </div>
      <span style="font-size:11px;color:#334155;white-space:nowrap">
        <b style="color:#7dd3fc">${f.length}</b> shown
      </span>
    </div>

    ${curView==="table" ? buildTable(f) : buildCards(f)}

    <div class="footer">
      <span>ClinicalTrials.gov API v2 · Live · ${new Date().toLocaleDateString()} · All statuses · query: "lung cancer" Phase 2 interventional</span>
      <span>(A)=Actual start · (E)=Estimated · ◆ NSCLC · ⬡ Basket · ● mono · ◐ combo</span>
    </div>`;

  if (expId) {
    const el = document.getElementById("exp-"+expId);
    if (el) repaintExpanded();
  }
}

/* ══ Build table ════════════════════════════════════ */
function buildTable(f) {
  const cols = [
    ["nctId","NCT ID","7%"],
    ["drug","Drug","11%"],
    ["target","Target","8%"],
    ["status","Status","8%"],
    ["trialType","Type","6%"],
    ["armType","Arm","6%"],
    ["startDate","Start Date","9%"],
    ["endDate","Est. End","8%"],
    ["sponsor","Sponsor","15%"],
    ["enrollment","N","5%"],
  ];
  const ths = cols.map(([k,l,w])=>
    `<th class="${thC(k)}" style="width:${w}" onclick="if(sk==='${k}'){sd_=sd_==='asc'?'desc':'asc'}else{sk='${k}';sd_='asc'};render()">${l}</th>`
  ).join("") + `<th style="width:20px;background:#0b1628;border-bottom:1px solid #1e293b"></th>`;

  if (!f.length) {
    return `<div class="tw"><table><thead><tr>${ths}</tr></thead>
      <tbody><tr><td colspan="${cols.length+1}" style="text-align:center;padding:40px;color:#334155;font-size:12px">
        ${loading ? "Loading — results appear as pages are fetched…" : "No trials matched. Try clearing all filters."}
      </td></tr></tbody></table></div>`;
  }

  const rows = f.map(s => {
    const isE = expId===s.nctId;
    const sdD = s.startDate
      ? s.startDate + `<span style="font-size:9px;color:#334155;margin-left:2px">${s.startType==="ACTUAL"?"(A)":s.startType==="ESTIMATED"?"(E)":""}</span>`
      : "—";
    return `
      <tr class="dr${isE?" open":""}" onclick="toggleExp('${s.nctId}')">
        <td style="color:#38bdf8;font-weight:600;white-space:nowrap">${s.nctId}</td>
        <td style="color:#f0f9ff;font-weight:500;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.drug}</td>
        <td>${mBdg(s.target)}</td>
        <td>${sBdg(s.status)}</td>
        <td>${tBdg(s.trialType)}</td>
        <td>${aBdg(s.armType)}</td>
        <td style="color:#94a3b8;font-size:11px;white-space:nowrap">${sdD}</td>
        <td style="color:#475569;font-size:11px;white-space:nowrap">${s.endDate||"—"}</td>
        <td style="color:#64748b;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px">${s.sponsor}</td>
        <td style="color:#475569;font-size:11px;text-align:right">${s.enrollment?Number(s.enrollment).toLocaleString():"—"}</td>
        <td style="text-align:center;color:#334155;font-size:11px">${isE?"▲":"▼"}</td>
      </tr>
      <tr class="er"${isE?"":" style='display:none'"}>
        <td colspan="${cols.length+1}"><div id="exp-${s.nctId}"></div></td>
      </tr>`;
  }).join("");

  return `<div class="tw"><table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ══ Build cards ════════════════════════════════════ */
function buildCards(f) {
  if (!f.length) return `<div style="text-align:center;padding:40px;color:#334155;font-size:12px">
    ${loading?"Loading…":"No trials matched. Try clearing all filters."}</div>`;
  return `<div class="grid">${f.map(s => {
    const col = MUT_C[s.target]||"#94a3b8";
    const sdD = s.startDate ? sdDisp(s) : null;
    return `<div class="card" style="border-top:2px solid ${col};border-left:0.5px solid ${col}30">
      <div class="ctop">
        <div>
          <div class="cnct">${s.nctId}</div>
          <div class="cdrug">${s.drug}</div>
        </div>
        <div style="flex-shrink:0">${mBdg(s.target)}</div>
      </div>
      <div class="cttl">${s.title}</div>
      <div class="ctags">
        ${sBdg(s.status)} ${tBdg(s.trialType)} ${aBdg(s.armType)}
        ${sdD?`<span style="font-size:10px;color:#475569">${sdD}</span>`:""}
      </div>
      <div class="cfoot">
        <span style="color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:65%">${s.sponsor}</span>
        <a href="https://clinicaltrials.gov/study/${s.nctId}" target="_blank"
          style="color:#38bdf8;font-size:10px;font-weight:600;flex-shrink:0">View ↗</a>
      </div>
    </div>`;
  }).join("")}</div>`;
}

/* ══ Toggle row expand ══════════════════════════════ */
function toggleExp(id) {
  const was = expId===id;
  expId = was ? null : id;
  render();
  if (!was) {
    repaintExpanded();
    const s = studies.find(x=>x.nctId===id);
    if (s) loadRelated(id, s.drug);
  }
}

/* ══ Boot ═══════════════════════════════════════════ */
loadStudies();
</script>
</body>
</html>

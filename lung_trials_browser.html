<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lung Cancer Targeted Therapy Trials Browser</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0e1a;
            --bg-card: #131829;
            --bg-hover: #1a1f35;
            --accent-teal: #14f195;
            --accent-purple: #9333ea;
            --accent-blue: #3b82f6;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-dim: #64748b;
            --border: #1e293b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(147, 51, 234, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(20, 241, 149, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        #root {
            position: relative;
            z-index: 1;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header */
        .header {
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 2rem;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-teal), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .header p {
            font-size: 1.125rem;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            margin-top: 0.25rem;
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .search-input, .select-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .search-input:focus, .select-input:focus {
            outline: none;
            border-color: var(--accent-teal);
            box-shadow: 0 0 0 3px rgba(20, 241, 149, 0.1);
        }

        .filter-pills {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .pill {
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
        }

        .pill:hover {
            background: var(--bg-hover);
            border-color: var(--accent-teal);
        }

        .pill.active {
            background: var(--accent-teal);
            color: var(--bg-dark);
            border-color: var(--accent-teal);
            font-weight: 700;
        }

        /* Trial Grid */
        .trials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .trial-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .trial-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-teal), var(--accent-purple));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .trial-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-teal);
            box-shadow: 0 20px 40px rgba(20, 241, 149, 0.1);
        }

        .trial-card:hover::before {
            opacity: 1;
        }

        .trial-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .trial-nct {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--accent-teal);
        }

        .trial-status {
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-completed {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .status-recruiting {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-blue);
        }

        .status-active {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .status-terminated, .status-withdrawn {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .status-unknown {
            background: rgba(100, 116, 139, 0.1);
            color: var(--text-dim);
        }

        .trial-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .trial-acronym {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-purple);
            margin-bottom: 1rem;
        }

        .trial-meta {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
        }

        .meta-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        .meta-value {
            font-size: 0.875rem;
            font-weight: 600;
            margin-top: 0.25rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .target-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(147, 51, 234, 0.1);
            color: var(--accent-purple);
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .results-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem;
            background: var(--bg-hover);
            border-radius: 8px;
            margin-top: 1rem;
            border: 1px solid var(--border);
        }

        .results-badge.has-results {
            background: rgba(20, 241, 149, 0.05);
            border-color: var(--accent-teal);
        }

        .results-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
        }

        .results-icon.success {
            background: var(--success);
            color: white;
        }

        .results-icon.empty {
            background: var(--text-dim);
            color: white;
        }

        .results-text {
            font-size: 0.875rem;
            font-weight: 500;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 14, 26, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 2rem;
            animation: fadeIn 0.2s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 2rem;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg-card);
            z-index: 1;
        }

        .modal-close {
            float: right;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            line-height: 1;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-body {
            padding: 2rem;
        }

        .detail-section {
            margin-bottom: 2rem;
        }

        .detail-section h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--accent-teal);
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .detail-item {
            padding: 1rem;
            background: var(--bg-hover);
            border-radius: 8px;
        }

        .ctg-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--accent-teal);
            color: var(--bg-dark);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
        }

        .ctg-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(20, 241, 149, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .trials-grid {
                grid-template-columns: 1fr;
            }

            .detail-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

"NCT05278364", "phase1NCT": ""}, {"nct": "NCT06254599", "title": "A Randomized, Open-label, Controlled, Multicenter Phase 3 Study Comparing Brigatinib Versus Alectinib in Patients With A", "acronym": "", "target": "ALK", "sponsor": "Takeda", "status": "NOT_YET_RECRUITING", "fdaOutcome": "Supportive Trial for Approved Drug", "startDate": "2025-06", "enrollment": 366, "hasResults": false, "resultsCount": 0, "aeCount": 0, "primaryOutcome": "", "phase2NCT": "NCT05257512", "phase1NCT": ""}];

        function TrialCard({ trial, onClick }) {
            const getStatusClass = (status) => {
                if (status.includes('COMPLETED')) return 'status-completed';
                if (status.includes('RECRUITING')) return 'status-recruiting';
                if (status.includes('ACTIVE')) return 'status-active';
                if (status.includes('TERMINATED') || status.includes('WITHDRAWN')) return 'status-terminated';
                return 'status-unknown';
            };

            return (
                <div className="trial-card" onClick={() => onClick(trial)}>
                    <div className="trial-header">
                        <div className="trial-nct">{trial.nct}</div>
                        <div className={`trial-status ${getStatusClass(trial.status)}`}>
                            {trial.status.replace(/_/g, ' ')}
                        </div>
                    </div>
                    
                    {trial.acronym && (
                        <div className="trial-acronym">{trial.acronym}</div>
                    )}
                    
                    <div className="trial-title">{trial.title}</div>
                    
                    <div className="trial-meta">
                        <div className="meta-item">
                            <div className="meta-label">Target</div>
                            <div className="meta-value">
                                <span className="target-badge">{trial.target || 'Unknown'}</span>
                            </div>
                        </div>
                        <div className="meta-item">
                            <div className="meta-label">Enrollment</div>
                            <div className="meta-value">{trial.enrollment || 'N/A'}</div>
                        </div>
                        <div className="meta-item">
                            <div className="meta-label">Start Date</div>
                            <div className="meta-value">{trial.startDate}</div>
                        </div>
                        <div className="meta-item">
                            <div className="meta-label">Sponsor</div>
                            <div className="meta-value" style={{fontSize: '0.75rem'}}>
                                {trial.sponsor.split(' ')[0]}...
                            </div>
                        </div>
                    </div>
                    
                    <div className={`results-badge ${trial.hasResults ? 'has-results' : ''}`}>
                        <div className={`results-icon ${trial.hasResults ? 'success' : 'empty'}`}>
                            {trial.hasResults ? '✓' : '○'}
                        </div>
                        <div className="results-text">
                            {trial.hasResults 
                                ? `${trial.resultsCount} outcomes, ${trial.aeCount} AE records`
                                : 'No results posted on CTG.gov'
                            }
                        </div>
                    </div>
                </div>
            );
        }

        function TrialModal({ trial, onClose }) {
            if (!trial) return null;

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={e => e.stopPropagation()}>
                        <div className="modal-header">
                            <button className="modal-close" onClick={onClose}>×</button>
                            <h2>{trial.acronym || trial.nct}</h2>
                            <div className="trial-nct" style={{marginTop: '0.5rem'}}>
                                {trial.nct}
                            </div>
                        </div>
                        
                        <div className="modal-body">
                            <div className="detail-section">
                                <h3>Trial Overview</h3>
                                <p style={{color: 'var(--text-secondary)', marginBottom: '1rem'}}>
                                    {trial.title}
                                </p>
                                
                                <div className="detail-grid">
                                    <div className="detail-item">
                                        <div className="meta-label">Molecular Target</div>
                                        <div className="meta-value">{trial.target || 'Unknown'}</div>
                                    </div>
                                    <div className="detail-item">
                                        <div className="meta-label">Status</div>
                                        <div className="meta-value">{trial.status.replace(/_/g, ' ')}</div>
                                    </div>
                                    <div className="detail-item">
                                        <div className="meta-label">Sponsor</div>
                                        <div className="meta-value" style={{fontSize: '0.875rem'}}>
                                            {trial.sponsor}
                                        </div>
                                    </div>
                                    <div className="detail-item">
                                        <div className="meta-label">FDA Outcome</div>
                                        <div className="meta-value" style={{fontSize: '0.875rem'}}>
                                            {trial.fdaOutcome}
                                        </div>
                                    </div>
                                    <div className="detail-item">
                                        <div className="meta-label">Start Date</div>
                                        <div className="meta-value">{trial.startDate}</div>
                                    </div>
                                    <div className="detail-item">
                                        <div className="meta-label">Enrollment</div>
                                        <div className="meta-value">{trial.enrollment} patients</div>
                                    </div>
                                </div>
                            </div>
                            
                            {trial.hasResults && (
                                <div className="detail-section">
                                    <h3>Posted Results</h3>
                                    <div className="detail-grid">
                                        <div className="detail-item">
                                            <div className="meta-label">Outcome Measures</div>
                                            <div className="meta-value">{trial.resultsCount}</div>
                                        </div>
                                        <div className="detail-item">
                                            <div className="meta-label">Adverse Events</div>
                                            <div className="meta-value">{trial.aeCount}</div>
                                        </div>
                                    </div>
                                    {trial.primaryOutcome && (
                                        <div style={{marginTop: '1rem', padding: '1rem', background: 'var(--bg-hover)', borderRadius: '8px'}}>
                                            <div className="meta-label">Primary Outcome</div>
                                            <div style={{marginTop: '0.5rem', color: 'var(--text-primary)'}}>
                                                {trial.primaryOutcome}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                            
                            <div className="detail-section">
                                <h3>Phase Linkages</h3>
                                <div className="detail-grid">
                                    {trial.phase2NCT && (
                                        <div className="detail-item">
                                            <div className="meta-label">Phase 2</div>
                                            <div className="meta-value">{trial.phase2NCT}</div>
                                        </div>
                                    )}
                                    {trial.phase1NCT && (
                                        <div className="detail-item">
                                            <div className="meta-label">Phase 1</div>
                                            <div className="meta-value">{trial.phase1NCT}</div>
                                        </div>
                                    )}
                                </div>
                            </div>
                            
                            <div style={{marginTop: '2rem'}}>
                                <a 
                                    href={`https://clinicaltrials.gov/study/${trial.nct}`}
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="ctg-link"
                                >
                                    View on ClinicalTrials.gov →
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedTarget, setSelectedTarget] = useState('all');
            const [selectedStatus, setSelectedStatus] = useState('all');
            const [showResultsOnly, setShowResultsOnly] = useState(false);
            const [selectedTrial, setSelectedTrial] = useState(null);

            const targets = useMemo(() => {
                const allTargets = [...new Set(TRIALS_DATA.map(t => t.target).filter(Boolean))];
                return ['all', ...allTargets.sort()];
            }, []);

            const filteredTrials = useMemo(() => {
                return TRIALS_DATA.filter(trial => {
                    const matchesSearch = trial.nct.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                        trial.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                        (trial.acronym && trial.acronym.toLowerCase().includes(searchTerm.toLowerCase()));
                    
                    const matchesTarget = selectedTarget === 'all' || trial.target === selectedTarget;
                    const matchesStatus = selectedStatus === 'all' || trial.status === selectedStatus;
                    const matchesResults = !showResultsOnly || trial.hasResults;

                    return matchesSearch && matchesTarget && matchesStatus && matchesResults;
                });
            }, [searchTerm, selectedTarget, selectedStatus, showResultsOnly]);

            const stats = useMemo(() => {
                return {
                    total: TRIALS_DATA.length,
                    withResults: TRIALS_DATA.filter(t => t.hasResults).length,
                    completed: TRIALS_DATA.filter(t => t.status === 'COMPLETED').length,
                    recruiting: TRIALS_DATA.filter(t => t.status.includes('RECRUITING')).length
                };
            }, []);

            return (
                <div className="app-container">
                    <div className="header">
                        <h1>Lung Cancer Trials</h1>
                        <p>60 Phase 3 Targeted Therapy Clinical Trials</p>
                        
                        <div className="stats-bar">
                            <div className="stat-card">
                                <div className="stat-label">Total Trials</div>
                                <div className="stat-value" style={{color: 'var(--accent-teal)'}}>
                                    {stats.total}
                                </div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-label">With Results</div>
                                <div className="stat-value" style={{color: 'var(--success)'}}>
                                    {stats.withResults}
                                </div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-label">Completed</div>
                                <div className="stat-value" style={{color: 'var(--accent-purple)'}}>
                                    {stats.completed}
                                </div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-label">Recruiting</div>
                                <div className="stat-value" style={{color: 'var(--accent-blue)'}}>
                                    {stats.recruiting}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="filters">
                        <div className="filter-group" style={{flex: 2}}>
                            <label className="filter-label">Search</label>
                            <input
                                type="text"
                                className="search-input"
                                placeholder="Search NCT, title, or acronym..."
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                        </div>
                        
                        <div className="filter-group">
                            <label className="filter-label">Target</label>
                            <select 
                                className="select-input"
                                value={selectedTarget}
                                onChange={(e) => setSelectedTarget(e.target.value)}
                            >
                                {targets.map(target => (
                                    <option key={target} value={target}>
                                        {target === 'all' ? 'All Targets' : target}
                                    </option>
                                ))}
                            </select>
                        </div>
                    </div>

                    <div className="filters">
                        <div className="filter-pills">
                            <div 
                                className={`pill ${!showResultsOnly ? 'active' : ''}`}
                                onClick={() => setShowResultsOnly(false)}
                            >
                                All Trials
                            </div>
                            <div 
                                className={`pill ${showResultsOnly ? 'active' : ''}`}
                                onClick={() => setShowResultsOnly(true)}
                            >
                                With Results Only
                            </div>
                        </div>
                    </div>

                    <div style={{marginBottom: '1rem', color: 'var(--text-dim)', fontFamily: 'JetBrains Mono, monospace', fontSize: '0.875rem'}}>
                        Showing {filteredTrials.length} of {stats.total} trials
                    </div>

                    {filteredTrials.length > 0 ? (
                        <div className="trials-grid">
                            {filteredTrials.map(trial => (
                                <TrialCard 
                                    key={trial.nct} 
                                    trial={trial}
                                    onClick={setSelectedTrial}
                                />
                            ))}
                        </div>
                    ) : (
                        <div className="empty-state">
                            <div className="empty-state-icon">🔍</div>
                            <h3>No trials found</h3>
                            <p>Try adjusting your filters or search terms</p>
                        </div>
                    )}

                    {selectedTrial && (
                        <TrialModal 
                            trial={selectedTrial}
                            onClose={() => setSelectedTrial(null)}
                        />
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NSCLC Phase 2 — Mutation-Targeted Trial Finder</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Mono',monospace;background:#050d1a;color:#e2e8f0;min-height:100vh}
a{color:#38bdf8;text-decoration:none}a:hover{text-decoration:underline}
input,select,button{font-family:inherit}
@keyframes spin{to{transform:rotate(360deg)}}

.hdr{background:linear-gradient(135deg,#060f1e,#0b1a30);border-bottom:1px solid #162032;padding:20px 24px 14px}
.hdr-tag{font-size:10px;letter-spacing:.18em;color:#3b82f6;text-transform:uppercase;font-weight:600;margin-bottom:4px}
.hdr-h1{font-size:clamp(14px,2vw,20px);font-weight:600;color:#f0f9ff;margin-bottom:3px}
.hdr-sub{font-size:11px;color:#475569}
.body{padding:14px 24px 60px}

.srow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.sc{background:#0a1628;border:1px solid #162032;border-radius:8px;padding:8px 13px;min-width:72px}
.sc-l{font-size:9px;color:#475569;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
.sc-v{font-size:18px;font-weight:600}

.prog{display:flex;align-items:center;gap:10px;background:#0a1628;border:1px solid #162032;border-radius:8px;padding:9px 14px;margin-bottom:10px}
.pt{flex:1;height:3px;background:#162032;border-radius:2px;max-width:200px}
.pf{height:100%;background:#3b82f6;border-radius:2px;transition:width .3s}

.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:11px}
.chip{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;
  border:1px solid #162032;background:transparent;color:#475569;white-space:nowrap}
.chip:hover{border-color:#334155;color:#94a3b8}

.frow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center}
.frow input{flex:1 1 180px;min-width:0;padding:7px 10px;border-radius:6px;
  border:1px solid #162032;background:#0a1628;color:#e2e8f0;font-size:12px;outline:none}
.frow select{padding:7px 10px;border-radius:6px;border:1px solid #162032;
  background:#0a1628;color:#e2e8f0;font-size:12px;cursor:pointer;outline:none}
.vbtn{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;

.vbtn.on{border-color:#3b82f6;background:#0d2340;color:#7dd3fc}

.tw{overflow-x:auto;border-radius:10px;border:1px solid #0f1e30}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{padding:8px 11px;text-align:left;background:#0b1628;color:#64748b;font-size:10px;
  font-weight:600;letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid #1e293b;
  cursor:pointer;white-space:nowrap;user-select:none}
thead th:hover{color:#94a3b8}
.tha::after{content:" ↑"}.thd::after{content:" ↓"}.thn::after{content:" ⇅";opacity:.3}
tbody tr.dr{border-bottom:1px solid #0a1425;cursor:pointer;transition:background .1s}
tbody tr.dr:nth-child(4n+1),tbody tr.dr:nth-child(4n+2){background:#050d1a}

tbody tr.dr:hover,tbody tr.dr.open{background:#0c1e35!important}

td{padding:8px 11px;vertical-align:middle}
.bdg{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap}

.ei{padding:14px 16px;background:#060e1c;border-top:1px solid #162032}
.egrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
@media(max-width:640px){.egrid{grid-template-columns:1fr}}
.esec{background:#0a1628;border:1px solid #162032;border-radius:8px;padding:10px 12px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.card{background:#07101e;border:0.5px solid #162032;border-radius:10px;padding:12px 13px}
.card:hover{border-color:#3b82f6}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:6px}
.cnct{font-size:10px;color:#38bdf8;font-weight:600;margin-bottom:2px}
.cdrug{font-size:12px;color:#f0f9ff;font-weight:600}
.cttl{font-size:11px;color:#64748b;line-height:1.5;margin-bottom:7px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.ctags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px}
.cfoot{display:flex;justify-content:space-between;align-items:center;font-size:10px;border-top:1px solid #162032;padding-top:6px}

.errmsg{background:#1c0808;border:1px solid #7f1d1d;border-radius:8px;padding:12px 16px;

<body>
<div class="hdr">
  <div class="hdr-tag">ClinicalTrials.gov · Phase II · Live API · All Statuses</div>
  <div class="hdr-h1">NSCLC + Basket — Mutation-Targeted Therapy Finder</div>
  <div class="hdr-sub">Advanced / Metastatic · All genetic mutations · Click any row for Phase 1 &amp; 3 companion studies</div>
</div>

<div class="body" id="app">
  <div style="text-align:center;padding:70px 0;color:#475569">
    <div style="font-size:10px;letter-spacing:.2em;color:#3b82f6;margin-bottom:12px;text-transform:uppercase">Connecting to ClinicalTrials.gov…</div>
    <div style="font-size:30px;animation:spin 1s linear infinite;display:inline-block">⟳</div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   CORS FIX: every CTG request is routed through
   api.allorigins.win/raw?url=<encoded CTG URL>
   This lets GitHub Pages (or any static host) call
   the ClinicalTrials.gov API without CORS errors.
═══════════════════════════════════════════════════════ */
const PROXY = "https://api.allorigins.win/raw?url=";
const CTG   = "https://clinicaltrials.gov/api/v2/studies";

function proxied(ctgUrl) {
  return PROXY + encodeURIComponent(ctgUrl);
}

/* ── Drug → mutation map ── */
const DM = {
  osimertinib:"EGFR",tagrisso:"EGFR",erlotinib:"EGFR",tarceva:"EGFR",
  gefitinib:"EGFR",iressa:"EGFR",afatinib:"EGFR",gilotrif:"EGFR",
  dacomitinib:"EGFR",vizimpro:"EGFR",lazertinib:"EGFR",furmonertinib:"EGFR",
  aumolertinib:"EGFR",alflutinib:"EGFR",zipalertinib:"EGFR",sunvozertinib:"EGFR",
  mobocertinib:"EGFR",exkivity:"EGFR",befotertinib:"EGFR",nazartinib:"EGFR",
  olmutinib:"EGFR",rociletinib:"EGFR","blu-945":"EGFR","blu-701":"EGFR",
  rezivertinib:"EGFR",almonertinib:"EGFR",avitinib:"EGFR","hs-10296":"EGFR",
  alectinib:"ALK",alecensa:"ALK",brigatinib:"ALK",alunbrig:"ALK",
  lorlatinib:"ALK",lorbrena:"ALK",ensartinib:"ALK",iruplinalkib:"ALK",
  envonalkib:"ALK",ceritinib:"ALK",zykadia:"ALK",belizatinib:"ALK",
  repotrectinib:"ROS1",augtyro:"ROS1",taletrectinib:"ROS1","ds-6051b":"ROS1",
  larotrectinib:"NTRK",vitrakvi:"NTRK",entrectinib:"NTRK",rozlytrek:"NTRK",selitrectinib:"NTRK",
  tepotinib:"MET",tepmetko:"MET",capmatinib:"MET",tabrecta:"MET",
  savolitinib:"MET",glumetinib:"MET",bozitinib:"MET",vebreltinib:"MET",
  elzovantinib:"MET","apl-101":"MET",crizotinib:"MET",xalkori:"MET",
  selpercatinib:"RET",retevmo:"RET",pralsetinib:"RET",gavreto:"RET","bos172738":"RET",
  sotorasib:"KRAS G12C",lumakras:"KRAS G12C",adagrasib:"KRAS G12C",krazati:"KRAS G12C",
  garsorasib:"KRAS G12C",glecirasib:"KRAS G12C",jdq443:"KRAS G12C",divarasib:"KRAS G12C",
  "mrtx1133":"KRAS G12D","rmc-9805":"KRAS G12D","rmc-6236":"KRAS","ly3537982":"KRAS G12C",
  zongertinib:"HER2",hernexeos:"HER2",pyrotinib:"HER2",poziotinib:"HER2",
  tucatinib:"HER2",neratinib:"HER2",sevabertinib:"HER2",lapatinib:"HER2",
  "trastuzumab deruxtecan":"HER2",enhertu:"HER2","ds-8201":"HER2",
  "patritumab deruxtecan":"HER3","u3-1402":"HER3",
  dabrafenib:"BRAF",tafinlar:"BRAF",vemurafenib:"BRAF",encorafenib:"BRAF",
  trametinib:"MEK",mekinist:"MEK",cobimetinib:"MEK",binimetinib:"MEK",selumetinib:"MEK",
  erdafitinib:"FGFR",infigratinib:"FGFR",pemigatinib:"FGFR",futibatinib:"FGFR",
  zenocutuzumab:"NRG1",seribantumab:"NRG1",
  alpelisib:"PIK3CA",copanlisib:"PIK3CA",idelalisib:"PIK3CA",buparlisib:"PIK3CA",
  olaparib:"PARP",lynparza:"PARP",rucaparib:"PARP",niraparib:"PARP",veliparib:"PARP",
  everolimus:"mTOR",afinitor:"mTOR",temsirolimus:"mTOR",
  palbociclib:"CDK4/6",ribociclib:"CDK4/6",abemaciclib:"CDK4/6",
  belzutifan:"HIF2α",welireg:"HIF2α",
  tazemetostat:"SMARCA4",
  amivantamab:"EGFR/MET",rybrevant:"EGFR/MET",
};

/* keyword fallback patterns */
const PAT = [
  {t:"EGFR",      k:["egfr mutation","egfr inhibitor","egfr-mutant","egfr-positive","egfr tki","epidermal growth factor receptor mutation"]},
  {t:"ALK",       k:["alk fusion","alk rearrangement","alk-positive","alk inhibitor","alk-rearranged"]},
  {t:"KRAS G12C", k:["kras g12c","krasg12c","kras-g12c"]},
  {t:"KRAS",      k:["kras g12d","kras g12v","kras mutant","pan-kras"]},
  {t:"ROS1",      k:["ros1 fusion","ros1 rearrangement","ros1-positive","ros1 inhibitor"]},
  {t:"MET",       k:["met exon 14","metex14","met amplification","c-met inhibitor","met inhibitor"]},
  {t:"RET",       k:["ret fusion","ret rearrangement","ret-positive","ret inhibitor"]},
  {t:"HER2",      k:["her2 mutation","her2-mutant","erbb2 mutation","her2-positive lung","her2 amplification lung"]},
  {t:"HER3",      k:["her3","erbb3","patritumab"]},
  {t:"NTRK",      k:["ntrk fusion","trk fusion","neurotrophic receptor"]},
  {t:"BRAF",      k:["braf v600","braf mutation","braf inhibitor"]},
  {t:"MEK",       k:["mek inhibitor","map2k"]},
  {t:"FGFR",      k:["fgfr fusion","fgfr amplification","fgfr mutation","fgfr inhibitor"]},
  {t:"NRG1",      k:["nrg1 fusion","neuregulin"]},
  {t:"PIK3CA",    k:["pik3ca mutation","pi3k inhibitor","pi3-kinase inhibitor"]},
  {t:"PARP",      k:["parp inhibitor"]},
  {t:"mTOR",      k:["mtor inhibitor","everolimus","temsirolimus"]},
  {t:"CDK4/6",    k:["cdk4/6","cdk4 inhibitor","cdk6 inhibitor","cyclin-dependent kinase"]},
  {t:"HIF2α",     k:["hif-2","hif2alpha","belzutifan"]},
  {t:"SMARCA4",   k:["smarca4","swi/snf","tazemetostat"]},
  {t:"TP53",      k:["tp53 mutation","p53 mutant","apr-246","eprenetapopt"]},
  {t:"STK11",     k:["stk11","lkb1 mutation","keap1 mutation"]},
  {t:"EGFR/MET",  k:["amivantamab","egfr-met bispecific","egfr met bispecific"]},
  {t:"BASKET",    k:["basket trial","tumor agnostic","tissue agnostic","histology agnostic",
                     "pan-tumor","biomarker-selected","molecularly selected","multiple tumor types",
                     "histology-independent","agnostic trial"]},
];

const MUT_C = {
  EGFR:"#f97316",ALK:"#a78bfa",ROS1:"#34d399",MET:"#60a5fa",RET:"#fb7185",
  "KRAS G12C":"#eab308","KRAS G12D":"#ca8a04",KRAS:"#d97706",
  HER2:"#e879f9",HER3:"#c084fc",NTRK:"#2dd4bf",BRAF:"#f43f5e",MEK:"#f59e0b",
  FGFR:"#06b6d4",NRG1:"#7c3aed",PIK3CA:"#84cc16",PARP:"#d946ef",
  mTOR:"#10b981","CDK4/6":"#0ea5e9","HIF2α":"#6366f1",SMARCA4:"#8b5cf6",
  TP53:"#ef4444","EGFR/MET":"#fb923c",STK11:"#78716c",BASKET:"#a78bfa",
};
const STS = {
  RECRUITING:              {l:"Recruiting",    bg:"#052e16",tc:"#4ade80"},
  ACTIVE_NOT_RECRUITING:   {l:"Active",        bg:"#1c1400",tc:"#fbbf24"},
  COMPLETED:               {l:"Completed",     bg:"#0c1a3d",tc:"#818cf8"},
  NOT_YET_RECRUITING:      {l:"Not Yet",       bg:"#082f49",tc:"#7dd3fc"},
  TERMINATED:              {l:"Terminated",    bg:"#2d0b0b",tc:"#f87171"},
  WITHDRAWN:               {l:"Withdrawn",     bg:"#2d0b0b",tc:"#f87171"},
  SUSPENDED:               {l:"Suspended",     bg:"#1c1400",tc:"#fbbf24"},
  ENROLLING_BY_INVITATION: {l:"By Invitation", bg:"#0c2a1a",tc:"#6ee7b7"},
  UNKNOWN:                 {l:"Unknown",       bg:"#1e293b",tc:"#64748b"},
};

/* ── mutation detection ── */
function detectMut(raw) {
  const p   = raw.protocolSection || {};
  const idm = p.identificationModule   || {};
  const cdm = p.conditionsModule       || {};
  const dsc = p.descriptionModule      || {};
  const arm = p.armsInterventionsModule|| {};

  const title = (idm.briefTitle    || "").toLowerCase();
  const offic = (idm.officialTitle || "").toLowerCase();
  const cond  = (cdm.conditions    || []).join(" ").toLowerCase();
  const kws   = (cdm.keywords      || []).join(" ").toLowerCase();
  const summ  = (dsc.briefSummary  || "").slice(0,600).toLowerCase();
  const all   = title+" "+offic+" "+cond+" "+kws+" "+summ;

  // Layer 1 – intervention drug names
  for (const iv of (arm.interventions||[])) {
    if (!["DRUG","BIOLOGICAL","COMBINATION_PRODUCT"].includes(iv.type)) continue;
    const n = (iv.name||"").toLowerCase();
    for (const [kw,mut] of Object.entries(DM)) {
      if (n.includes(kw)) return {target:mut, drug:iv.name};
    }
  }
  // Layer 2 – title/official title drug names
  for (const [kw,mut] of Object.entries(DM)) {
    if (title.includes(kw)||offic.includes(kw))
      return {target:mut, drug:kw.charAt(0).toUpperCase()+kw.slice(1)};
  }
  // Layer 3 – keyword patterns across all text
  for (const pat of PAT) {
    for (const k of pat.k) {
      if (all.includes(k)) {
        const fd = (arm.interventions||[])
          .find(iv=>["DRUG","BIOLOGICAL","COMBINATION_PRODUCT"].includes(iv.type));
        return {target:pat.t, drug:fd?.name||pat.t};
      }
    }
  }
  return null;
}

function parseStudy(raw) {
  const hit = detectMut(raw);
  if (!hit) return null;
  const p   = raw.protocolSection || {};
  const idm = p.identificationModule       || {};
  const stm = p.statusModule               || {};
  const spm = p.sponsorCollaboratorsModule || {};
  const dsm = p.designModule               || {};
  const cdm = p.conditionsModule           || {};
  const dsc = p.descriptionModule          || {};
  const arm = p.armsInterventionsModule    || {};
  let armType="UNKNOWN";
  for (const a of (arm.armGroups||[])) {
    if (a.type!=="EXPERIMENTAL") continue;
    armType = (a.interventionNames||[]).length<=1?"MONO":"COMBO";
    break;
  }
  const sdS = stm.startDateStruct||{};
  return {
    nctId:      idm.nctId,
    title:      idm.briefTitle||"",
    target:     hit.target,
    drug:       hit.drug,
    status:     stm.overallStatus||"UNKNOWN",
    startDate:  sdS.date||null,
    startType:  sdS.type||null,
    endDate:    stm.primaryCompletionDateStruct?.date||null,
    sponsor:    spm.leadSponsor?.name||"—",
    enrollment: dsm.enrollmentInfo?.count||null,
    armType,
    trialType:  hit.target==="BASKET"?"BASKET":"NSCLC",
    summary:    (dsc.briefSummary||"").slice(0,380),
    conditions: (cdm.conditions||[]).join("; "),
  };
}

/* ── state ── */
let studies=[],loading=true,scanned=0,pagesDone=0,errMsg=null;
let sk="startDate",sd_="desc",fT="All",fS="All",fTY="All",fQ="";
let curView="table",expId=null;
const relC={};

/* ── fetch via proxy ── */
async function ctgFetch(ctgUrl) {
  const res = await fetch(proxied(ctgUrl));
  if (!res.ok) throw new Error("HTTP "+res.status);
  return res.json();
}

async function loadStudies() {
  loading=true; render();
  let token="";
  for (let page=0; page<10; page++) {
    try {
      const url = CTG
        + "?query.cond=non-small+cell+lung+cancer"
        + "&filter.phase=PHASE2"
        + "&aggFilters=studyType:int"
        + "&pageSize=100"
        + "&format=json"
        + (token ? "&pageToken="+encodeURIComponent(token) : "");
      const data = await ctgFetch(url);
      const raw  = data.studies||[];
      token = data.nextPageToken||"";
      scanned += raw.length;
      for (const r of raw) { const s=parseStudy(r); if(s) studies.push(s); }
      pagesDone=page+1;
      render();
      if (!token) break;
    } catch(e) {
      errMsg = e.message;
      break;
    }
  }
  loading=false; render();
}

async function loadRelated(nctId,drug,target) {
  if (relC[nctId]) return;
  relC[nctId]={p1:[],p3:[],loading:true};
  repaintExp();
  const term=(drug&&drug!=="—"&&drug.length<40)?drug:target;
  const [p1,p3]=await Promise.all([fetchPhase(term,"PHASE1"),fetchPhase(term,"PHASE3")]);
  relC[nctId]={p1,p3,loading:false};
  repaintExp();
}
async function fetchPhase(term,phase) {
  try {
    const url = CTG
      + "?query.term="+encodeURIComponent(term)
      + "&filter.phase="+phase
      + "&query.cond=lung+cancer"
      + "&pageSize=8&format=json";
    const d = await ctgFetch(url);
    return (d.studies||[]).map(s=>({
      nctId:     s.protocolSection?.identificationModule?.nctId,
      title:     s.protocolSection?.identificationModule?.briefTitle||"",
      status:    s.protocolSection?.statusModule?.overallStatus||"UNKNOWN",
      startDate: s.protocolSection?.statusModule?.startDateStruct?.date||null,
    }));
  } catch { return []; }
}

/* ── filter/sort ── */
function getF() {
  let s=studies;
  if(fT!=="All") s=s.filter(x=>x.target===fT);
  if(fS!=="All") s=s.filter(x=>x.status===fS);
  if(fTY!=="All") s=s.filter(x=>x.trialType===fTY);
  if(fQ){const q=fQ.toLowerCase();s=s.filter(x=>[x.title,x.drug,x.nctId,x.sponsor,x.target,x.conditions].some(v=>v&&v.toLowerCase().includes(q)));}
  return [...s].sort((a,b)=>{const av=a[sk]||"",bv=b[sk]||"";return sd_==="asc"?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av));});
}
function cnt(k){const m={};studies.forEach(s=>{m[s[k]]=(m[s[k]]||0)+1});return m;}

/* ── badges ── */
function mB(t){const c=MUT_C[t]||"#94a3b8";return`<span class="bdg" style="background:${c}18;color:${c};border:1px solid ${c}40">${t}</span>`;}
function sB(st){const s=STS[st]||STS.UNKNOWN;return`<span class="bdg" style="background:${s.bg};color:${s.tc}">${s.l}</span>`;}
function aB(a){return a==="MONO"?`<span style="font-size:10px;font-weight:600;color:#4ade80">● MONO</span>`:a==="COMBO"?`<span style="font-size:10px;font-weight:600;color:#fbbf24">◐ COMBO</span>`:`<span style="font-size:10px;color:#334155">—</span>`;}
function tB(t){return t==="BASKET"?`<span style="font-size:10px;font-weight:600;color:#a78bfa">⬡ BASKET</span>`:`<span style="font-size:10px;font-weight:600;color:#38bdf8">◆ NSCLC</span>`;}
function thC(k){return sk===k?(sd_==="asc"?"tha":"thd"):"thn";}
function sdStr(s){if(!s.startDate)return"—";return s.startDate+(s.startType==="ACTUAL"?" (A)":s.startType==="ESTIMATED"?" (E)":"");}
function rsB(st){const s=STS[st]||STS.UNKNOWN;return`<span class="rst" style="background:${s.bg};color:${s.tc}">${s.l}</span>`;}

/* ── expanded row ── */
function repaintExp() {
  if(!expId)return;
  const el=document.getElementById("exp-"+expId);if(!el)return;
  const s=studies.find(x=>x.nctId===expId);if(!s)return;
  const rel=relC[expId];
  const mkL=(arr,ph)=>!arr.length
    ?`<li class="ri"><span style="font-size:11px;color:#334155">No ${ph} lung cancer studies found for "${s.drug}"</span></li>`
    :arr.map(r=>`<li class="ri">
        <a href="https://clinicaltrials.gov/study/${r.nctId}" target="_blank" class="rnct">${r.nctId}</a>
        ${rsB(r.status)}<span class="rtitle">${r.title}</span>
        ${r.startDate?`<span style="font-size:10px;color:#334155">${r.startDate}</span>`:""}
      </li>`).join("");
  const relH=!rel
    ?`<p style="font-size:11px;color:#334155">Loading…</p>`
    :rel.loading
    ?`<p style="font-size:11px;color:#334155;display:flex;align-items:center;gap:6px"><span style="animation:spin 1s linear infinite;display:inline-block">⟳</span> Querying Phase 1 &amp; 3…</p>`
    :`<div style="margin-bottom:10px"><div class="esec-t" style="color:#a78bfa">Phase 1 — ${rel.p1.length} found</div><ul class="rlist">${mkL(rel.p1,"Phase 1")}</ul></div>
      <div><div class="esec-t" style="color:#4ade80">Phase 3 — ${rel.p3.length} found</div><ul class="rlist">${mkL(rel.p3,"Phase 3")}</ul></div>`;
  el.innerHTML=`<div class="ei">
    <div style="font-size:12px;color:#94a3b8;line-height:1.65;margin-bottom:10px">${s.title}</div>
    <div class="egrid">
      <div class="esec">
        <div class="esec-t">Study details — ClinicalTrials.gov</div>
        <div class="kv"><span class="k">NCT ID</span><span class="v"><a href="https://clinicaltrials.gov/study/${s.nctId}" target="_blank">${s.nctId} ↗</a></span></div>
        <div class="kv"><span class="k">Study start date</span><span class="v">${sdStr(s)}</span></div>
        <div class="kv"><span class="k">Est. primary completion</span><span class="v">${s.endDate||"—"}</span></div>
        <div class="kv"><span class="k">Enrollment target</span><span class="v">${s.enrollment?Number(s.enrollment).toLocaleString():"—"}</span></div>
        <div class="kv"><span class="k">Lead sponsor</span><span class="v">${s.sponsor}</span></div>
        <div class="kv"><span class="k">Status</span><span class="v">${sB(s.status)}</span></div>
        <div class="kv"><span class="k">Drug</span><span class="v">${s.drug}</span></div>
        <div class="kv"><span class="k">Target</span><span class="v">${mB(s.target)}</span></div>
        <div class="kv"><span class="k">Arm</span><span class="v">${aB(s.armType)}</span></div>
        <div class="kv"><span class="k">Conditions</span><span class="v" style="font-size:10px">${(s.conditions||"—").slice(0,120)}</span></div>
      </div>
      <div class="esec"><div class="esec-t">Companion studies (same drug, lung cancer)</div>${relH}</div>
    </div>
    ${s.summary?`<div style="font-size:11px;color:#475569;line-height:1.65;border-left:2px solid #162032;padding-left:10px;margin-top:2px">${s.summary}…</div>`:""}
  </div>`;
}

/* ── main render ── */
function render() {
  const f=getF(),mc=cnt("target"),sc_=cnt("status");
  const muts=Object.entries(mc).sort((a,b)=>b[1]-a[1]);
  const pct=Math.min(95,Math.round((pagesDone/10)*100));
  const cards=[
    {l:"Total",     v:studies.length,                                              c:"#e2e8f0"},
    {l:"Recruiting",v:studies.filter(s=>s.status==="RECRUITING").length,           c:"#4ade80"},
    {l:"Active",    v:studies.filter(s=>s.status==="ACTIVE_NOT_RECRUITING").length,c:"#fbbf24"},
    {l:"Completed", v:studies.filter(s=>s.status==="COMPLETED").length,            c:"#818cf8"},
    {l:"Terminated",v:studies.filter(s=>s.status==="TERMINATED").length,           c:"#f87171"},
    {l:"Basket",    v:studies.filter(s=>s.trialType==="BASKET").length,            c:"#a78bfa"},
    {l:"Targets",   v:Object.keys(mc).length,                                      c:"#f97316"},
  ];
  const stOpts=[["All","All statuses"],...Object.entries(sc_).sort((a,b)=>b[1]-a[1]).map(([s,n])=>[s,`${STS[s]?.l||s} (${n})`])];

  document.getElementById("app").innerHTML=`
    <div class="srow">${cards.map(s=>`<div class="sc"><div class="sc-l">${s.l}</div><div class="sc-v" style="color:${s.c}">${s.v}</div></div>`).join("")}</div>

    ${errMsg?`<div class="errmsg">⚠ Error: ${errMsg}<br>The proxy (allorigins.win) may be temporarily down. Try reloading in a minute.</div>`:""}

    ${loading?`<div class="prog">
      <span style="font-size:14px;animation:spin 1s linear infinite;display:inline-block">⟳</span>
      <div style="flex:1">
        <div style="font-size:11px;color:#94a3b8;margin-bottom:4px">Page ${pagesDone}/10 · ${scanned} scanned · <b style="color:#7dd3fc">${studies.length}</b> matched</div>
        <div class="pt"><div class="pf" style="width:${pct}%"></div></div>
      </div>
    </div>`:`<div style="font-size:11px;color:#334155;margin-bottom:10px">
      ✓ ${scanned} Phase 2 NSCLC studies scanned · <b style="color:#7dd3fc">${studies.length}</b> mutation-targeted · All statuses
    </div>`}

    <div class="chips">
      <button class="chip" onclick="fT='All';expId=null;render()"
        style="border-color:${fT==="All"?"#3b82f6":"#162032"};background:${fT==="All"?"#0d2340":"transparent"};color:${fT==="All"?"#7dd3fc":"#475569"}">
        All · ${studies.length}
      </button>
      ${muts.map(([m,n])=>{const c=MUT_C[m]||"#94a3b8",a=fT===m;
        return`<button class="chip" onclick="fT='${m.replace(/'/g,"\\'")}';expId=null;render()"
          style="border-color:${a?c:"#162032"};background:${a?c+"20":"transparent"};color:${a?c:"#475569"}">${m} · ${n}</button>`;
      }).join("")}
    </div>

    <div class="frow">
      <input type="text" placeholder="Search NCT ID, drug, target, sponsor…"
        value="${fQ.replace(/"/g,"&quot;")}" oninput="fQ=this.value;render()"/>
      <select onchange="fS=this.value;render()">${stOpts.map(([v,l])=>`<option value="${v}"${fS===v?" selected":""}>${l}</option>`).join("")}</select>
      <select onchange="fTY=this.value;render()">
        <option value="All"${fTY==="All"?" selected":""}>NSCLC + Basket</option>
        <option value="NSCLC"${fTY==="NSCLC"?" selected":""}>NSCLC only</option>
        <option value="BASKET"${fTY==="BASKET"?" selected":""}>Basket only</option>
      </select>
      <div style="display:flex;gap:4px;margin-left:auto">
        <button class="vbtn${curView==="table"?" on":""}" onclick="curView='table';render()">⊞ Table</button>
        <button class="vbtn${curView==="cards"?" on":""}" onclick="curView='cards';render()">⊟ Cards</button>
      </div>
      <span style="font-size:11px;color:#334155;white-space:nowrap"><b style="color:#7dd3fc">${f.length}</b> shown</span>
    </div>

    ${curView==="table"?buildTbl(f):buildCards(f)}
    <div class="footer">
      <span>ClinicalTrials.gov API v2 · via allorigins.win proxy · ${new Date().toLocaleDateString()} · All statuses</span>
      <span>(A)=Actual start · (E)=Estimated · ◆ NSCLC · ⬡ Basket · ● mono · ◐ combo</span>
    </div>`;
  if(expId){const el=document.getElementById("exp-"+expId);if(el)repaintExp();}
}

function buildTbl(f) {
  const cols=[["nctId","NCT ID","7%"],["drug","Drug","11%"],["target","Target","8%"],
    ["status","Status","8%"],["trialType","Type","6%"],["armType","Arm","6%"],
    ["startDate","Start Date","9%"],["endDate","Est. End","8%"],["sponsor","Sponsor","14%"],["enrollment","N","5%"]];
  const ths=cols.map(([k,l,w])=>`<th class="${thC(k)}" style="width:${w}"
      onclick="sk==='${k}'?(sd_=sd_==='asc'?'desc':'asc'):(sk='${k}',sd_='asc');render()">${l}</th>`
    ).join("")+`<th style="width:20px;background:#0b1628;border-bottom:1px solid #1e293b"></th>`;
  if(!f.length)return`<div class="tw"><table><thead><tr>${ths}</tr></thead><tbody><tr>
    <td colspan="${cols.length+1}" style="text-align:center;padding:40px;color:#334155;font-size:12px">
    ${loading?"Fetching pages from ClinicalTrials.gov…":"No trials matched. Try clearing filters."}</td></tr></tbody></table></div>`;
  const rows=f.map(s=>{
    const isE=expId===s.nctId;
    const sdD=s.startDate?s.startDate+`<span style="font-size:9px;color:#334155;margin-left:2px">${s.startType==="ACTUAL"?"(A)":s.startType==="ESTIMATED"?"(E)":""}</span>`:"—";
    return`<tr class="dr${isE?" open":""}" onclick="toggleExp('${s.nctId}')">
        <td style="color:#38bdf8;font-weight:600;white-space:nowrap">${s.nctId}</td>
        <td style="color:#f0f9ff;font-weight:500;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.drug}</td>
        <td>${mB(s.target)}</td><td>${sB(s.status)}</td><td>${tB(s.trialType)}</td><td>${aB(s.armType)}</td>
        <td style="color:#94a3b8;font-size:11px;white-space:nowrap">${sdD}</td>
        <td style="color:#475569;font-size:11px;white-space:nowrap">${s.endDate||"—"}</td>
        <td style="color:#64748b;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px">${s.sponsor}</td>
        <td style="color:#475569;font-size:11px;text-align:right">${s.enrollment?Number(s.enrollment).toLocaleString():"—"}</td>
        <td style="text-align:center;color:#334155;font-size:11px">${isE?"▲":"▼"}</td>
      </tr>
      <tr class="er"${isE?"":" style='display:none'"}><td colspan="${cols.length+1}"><div id="exp-${s.nctId}"></div></td></tr>`;
  }).join("");
  return`<div class="tw"><table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

function buildCards(f){
  if(!f.length)return`<div style="text-align:center;padding:40px;color:#334155;font-size:12px">${loading?"Loading…":"No trials matched."}</div>`;
  return`<div class="grid">${f.map(s=>{const col=MUT_C[s.target]||"#94a3b8";
    return`<div class="card" style="border-top:2px solid ${col}">
      <div class="ctop"><div><div class="cnct">${s.nctId}</div><div class="cdrug">${s.drug}</div></div>
        <div style="flex-shrink:0">${mB(s.target)}</div></div>
      <div class="cttl">${s.title}</div>
      <div class="ctags">${sB(s.status)} ${tB(s.trialType)} ${aB(s.armType)}
        ${s.startDate?`<span style="font-size:10px;color:#475569">${sdStr(s)}</span>`:""}</div>
      <div class="cfoot">
        <span style="color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:65%">${s.sponsor}</span>
        <a href="https://clinicaltrials.gov/study/${s.nctId}" target="_blank" style="color:#38bdf8;font-size:10px;font-weight:600">View ↗</a>
      </div></div>`;}).join("")}</div>`;
}

function toggleExp(id){
  const was=expId===id; expId=was?null:id; render();
  if(!was){repaintExp();const s=studies.find(x=>x.nctId===id);if(s)loadRelated(id,s.drug,s.target);}
}

loadStudies();
</script>
</body>
</html>
